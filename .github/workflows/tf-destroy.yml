name: Terraform Destroy (All Layers)

on:
  workflow_dispatch:

# Same group as deploy workflows — prevents destroy and deploy from running simultaneously.
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Layer 4: GCP Apps (test service + ILB) ──
  destroy-gcp-apps:
    name: Destroy — GCP Apps
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: gcp/apps
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=sl-gke-tf-state-cavi" \
            -backend-config="prefix=terraform/interconnect-lab/apps"

      - name: Terraform Destroy
        run: terraform destroy -auto-approve

      # Wait for GKE ILB forwarding rules to be deprovisioned before
      # destroying the cluster. Without this, orphaned forwarding rules
      # block VPC deletion.
      - name: Wait for Load Balancer cleanup
        run: |
          echo "Waiting for forwarding rules to be removed..."
          for i in $(seq 1 30); do
            COUNT=$(gcloud compute forwarding-rules list \
              --project=gen-lang-client-0403070412 \
              --format="value(name)" 2>/dev/null | wc -l)
            if [ "$COUNT" -eq 0 ]; then
              echo "All forwarding rules removed."
              exit 0
            fi
            echo "Still $COUNT forwarding rules. Attempt $i/30..."
            sleep 10
          done
          echo "WARNING: Timeout waiting for forwarding rules. Proceeding with destroy."

  # ── Layer 3: AWS Compute (EC2 instances) ──
  destroy-aws-compute:
    name: Destroy — AWS Compute
    runs-on: ubuntu-latest
    needs: destroy-gcp-apps
    defaults:
      run:
        working-directory: aws/compute
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=interconnect-lab/aws-compute/terraform.tfstate" \
            -backend-config="region=us-east-2" \
            -backend-config="encrypt=true"

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        env:
          TF_VAR_state_bucket: ${{ secrets.TF_STATE_BUCKET }}

  # ── Layer 2: GCP Infra (GKE + VPN + NAT VM + VPC) ──
  destroy-gcp-infra:
    name: Destroy — GCP Infra
    needs: destroy-aws-compute
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: gcp/infra
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=sl-gke-tf-state-cavi" \
            -backend-config="prefix=terraform/interconnect-lab/infra"

      - name: Terraform Destroy
        run: terraform destroy -auto-approve

  # ── Layer 1: AWS Networking (VPCs + TGW + VPN + Endpoints) ──
  destroy-aws-networking:
    name: Destroy — AWS Networking
    runs-on: ubuntu-latest
    needs: destroy-gcp-infra
    defaults:
      run:
        working-directory: aws/networking
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=interconnect-lab/aws-networking/terraform.tfstate" \
            -backend-config="region=us-east-2" \
            -backend-config="encrypt=true"

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
