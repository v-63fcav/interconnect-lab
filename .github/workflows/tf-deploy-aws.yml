name: Deploy AWS (Networking + Compute)

on:
  workflow_dispatch:

# Single apply at a time. Shared with tf-destroy.yml so deploy and destroy
# never run simultaneously.
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  networking:
    name: AWS Networking — VPCs + TGW + Endpoints + VPN
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: aws/networking
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=interconnect-lab/aws-networking/terraform.tfstate" \
            -backend-config="region=us-east-2" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color -input=false

      - name: Terraform Apply
        run: terraform apply -auto-approve

  compute:
    name: AWS Compute — EC2 Test Instances
    runs-on: ubuntu-latest
    needs: networking
    permissions:
      contents: read
    defaults:
      run:
        working-directory: aws/compute
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=interconnect-lab/aws-compute/terraform.tfstate" \
            -backend-config="region=us-east-2" \
            -backend-config="encrypt=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -no-color -input=false
        env:
          TF_VAR_state_bucket: ${{ secrets.TF_STATE_BUCKET }}

      - name: Terraform Apply
        run: terraform apply -auto-approve
        env:
          TF_VAR_state_bucket: ${{ secrets.TF_STATE_BUCKET }}
